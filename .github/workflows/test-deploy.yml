name: Test Deployment

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '25'

    - name: Try restore Gradle Cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-build-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-build-

    - name: Create changelog
      run: |
        version=$(grep -Po 'mod_version=\K.*' gradle.properties)
        version=${version%-SNAPSHOT}

        echo "_Please note that this is a SNAPSHOT which might be unstable_" > current-changelog.txt
        echo "" >> current-changelog.txt
        awk -v ver="$version" '/^# / { if (p) { exit }; if ($2 == ver) { p=1; next } } p' CHANGELOG.md >> current-changelog.txt
        echo "" >> current-changelog.txt
        echo "[Full changelog](https://github.com/litetex-oss/${{ github.event.repository.name }}/blob/dev/CHANGELOG.md)" >> current-changelog.txt

        cat current-changelog.txt

    - name: Build and publish
      run: ./gradlew clean build modrinth --info --stacktrace
      env:
        MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        MODRINTH_VERSION_TYPE: alpha
        MODRINTH_CHANGELOG_FILE: current-changelog.txt

    - name: Upload mod files
      uses: actions/upload-artifact@v7
      with:
        name: mod-files
        path: |
          build/devlibs/*-sources.jar
          build/libs/*.jar
          !build/libs/*-sources.jar
          !build/libs/*-javadoc.jar
        if-no-files-found: error

    - name: Publish to Maven repositories
      continue-on-error: true
      run: ./gradlew publish publishToSonatype closeAndReleaseSonatypeStagingRepository --info --stacktrace
      env:
        MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        MAVEN_PUBLISH_URL: https://maven.pkg.github.com/litetex-oss/central
        MAVEN_PUBLISH_USERNAME: '' # Not used by GitHub Packages
        MAVEN_PUBLISH_PASSWORD: ${{ secrets.PACKAGES_CENTRAL_TOKEN }}
        SONATYPE_MAVEN_CENTRAL_PORTAL_USERNAME: ${{ secrets.SONATYPE_MAVEN_CENTRAL_PORTAL_USERNAME }}
        SONATYPE_MAVEN_CENTRAL_PORTAL_TOKEN: ${{ secrets.SONATYPE_MAVEN_CENTRAL_PORTAL_TOKEN }}

    - id: check-for-curseforge
      run: |
        [ -z $CURSEFORGE_TOKEN ] || echo "has=true" >> "$GITHUB_OUTPUT"
      env:
        CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

    - name: Publish to CurseForge
      uses: Kira-NT/mc-publish@995edadc13559a8b28d0b7e6571229f067ec7659 # v3
      if: ${{ steps.check-for-curseforge.outputs.has }}
      with:
        curseforge-id: null
        curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
        changelog-file: current-changelog.txt
        fail-mode: 'warn'
        version-type: 'alpha'
